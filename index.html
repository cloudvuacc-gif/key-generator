<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - Anti-AFK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .box{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #00ff96;box-shadow:0 0 30px rgba(0,255,150,0.2);max-width:500px;width:95%}
        h2{color:#00ff96;margin-bottom:5px}
        .key{background:#000;color:#00ff96;font-family:monospace;font-size:20px;padding:20px;margin:20px 0;border-radius:10px;border:2px dashed #00ff96;word-break:break-all}
        button{background:#00ff96;color:#000;border:none;padding:14px 40px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;margin:5px}
        button:hover{background:#00cc78}
        input{width:100%;padding:12px;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:8px;font-size:14px;margin:10px 0;text-align:center}
        input:focus{outline:none;border-color:#00ff96}
        .lock-btn{display:inline-block;background:#00ff96;color:#000;padding:16px 40px;font-size:16px;font-weight:bold;border-radius:10px;text-decoration:none;margin:15px 0}
        .info{color:#888;font-size:11px;margin-top:15px;line-height:1.6}
        .warning{color:#ff5555;font-size:13px;margin:10px 0}
        .uid-badge{background:#1a1a3a;color:#88aaff;padding:8px 15px;border-radius:20px;display:inline-block;margin:5px;font-size:12px}
        .editable-note{color:#ffaa00;font-size:10px;margin:5px 0}
    </style>
</head>
<body>
    <div class="box" id="main"></div>
    <script>
        var LV = "https://link-center.net/6819549/eLZPTLtWBC8k";
        var hash = new URLSearchParams(window.location.search).get('hash');
        var uidFromUrl = new URLSearchParams(window.location.search).get('uid');

        function generateKey(userId) {
            var now = new Date();
            var y = now.getFullYear();
            var m = ('0' + (now.getMonth() + 1)).slice(-2);
            var d = ('0' + now.getDate()).slice(-2);
            var h = ('0' + now.getHours()).slice(-2);
            var dateStr = y + m + d + h;
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            var uidHash = parseInt(userId).toString(36).toUpperCase();
            return "DEDSEC-" + uidHash + "-" + dateStr + "-" + random;
        }

        function showKey(userId, newKey) {
            document.getElementById('main').innerHTML = 
                '<h2>🛡️ YOUR KEY</h2>' +
                '<span class="uid-badge">👤 User ID: ' + userId + '</span>' +
                '<p style="color:#888;font-size:12px;margin-top:10px">Key locked to this account</p>' +
                '<div class="key" id="keyText">' + newKey + '</div>' +
                '<button id="copyBtn" onclick="copyAndClose()">📋 COPY KEY</button>' +
                '<p class="warning">⚠️ This key ONLY works for User ID ' + userId + '!</p>' +
                '<p class="info">Paste this key into your Roblox script</p>';
        }

        function showInputUserId(prefilledUid) {
            var uidValue = prefilledUid || '';
            var noteText = prefilledUid ? '✅ Auto-filled from link - You can change it!' : 'Enter your Roblox User ID';
            
            document.getElementById('main').innerHTML = 
                '<h2>🛡️ ENTER YOUR ROBLOX USER ID</h2>' +
                '<p style="color:#888;font-size:12px">Key will be locked to your account</p>' +
                '<input type="text" id="userIdInput" placeholder="Example: 123456789" value="' + uidValue + '" maxlength="15">' +
                '<p class="editable-note">' + noteText + '</p>' +
                '<button onclick="generateAndShow()">🔑 GET MY KEY</button>' +
                '<p class="warning">⚠️ Find your User ID in the script (COPY ID button)</p>' +
                '<p class="info">Make sure the ID is correct - Key only works for that ID!</p>';
        }

        function generateAndShow() {
            var userId = document.getElementById('userIdInput').value.trim();
            if (!userId || isNaN(userId) || parseInt(userId) < 1000) {
                alert('Please enter a valid Roblox User ID!');
                return;
            }
            
            var now = new Date();
            var currentHour = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + ('0'+now.getHours()).slice(-2);
            var usedHashes = JSON.parse(localStorage.getItem('used_hashes') || '{}');
            
            if (usedHashes[hash]) {
                showHashExpired();
                return;
            }
            
            usedHashes[hash] = { hour: currentHour, time: now.getTime(), userId: userId };
            localStorage.setItem('used_hashes', JSON.stringify(usedHashes));
            
            var newKey = generateKey(userId);
            showKey(userId, newKey);
        }

        function showHashExpired() {
            document.getElementById('main').innerHTML = 
                '<span style="font-size:60px;display:block;margin:20px 0">⏰</span>' +
                '<h2>HASH EXPIRED</h2>' +
                '<div style="background:#1a0000;border:1px solid #ff3333;padding:25px;border-radius:10px;margin:15px 0">' +
                '<p style="color:#ff5555;font-size:14px">This link has already been used!</p>' +
                '</div>' +
                '<a href="' + LV + '" class="lock-btn">🔗 GET NEW KEY</a>' +
                '<p class="info">Click above → Complete verification → Get new key</p>';
        }

        function showLock() {
            document.getElementById('main').innerHTML = 
                '<span style="font-size:60px;display:block;margin:20px 0">🔒</span>' +
                '<h2>VERIFICATION REQUIRED</h2>' +
                '<a href="' + LV + '" class="lock-btn">🔗 UNLOCK KEY</a>';
        }

        function copyAndClose() {
            var k = document.getElementById('keyText').textContent;
            if (k) {
                navigator.clipboard.writeText(k).then(function() {
                    document.getElementById('copyBtn').textContent = '✅ COPIED!';
                    document.getElementById('copyBtn').style.background = '#00cc78';
                    setTimeout(function() {
                        window.close();
                        document.body.innerHTML = '<div class="box"><h2>✅ KEY COPIED!</h2><p style="color:#00ff96;font-size:18px">You can close this page now</p></div>';
                    }, 1500);
                });
            }
        }

        // ============================================
        // LOGIC CHÍNH
        // ============================================
        if (hash && hash.length > 5) {
            var usedHashes = JSON.parse(localStorage.getItem('used_hashes') || '{}');
            if (usedHashes[hash]) {
                showHashExpired();
            } else {
                // Có UID từ URL → Tự động điền sẵn (nhưng vẫn cho sửa)
                // Không có UID → Để trống
                showInputUserId(uidFromUrl || '');
            }
        } else {
            showLock();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - Anti-AFK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .box{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #00ff96;box-shadow:0 0 30px rgba(0,255,150,0.2);max-width:500px;width:95%}
        h2{color:#00ff96;margin-bottom:5px}
        .key{background:#000;color:#00ff96;font-family:monospace;font-size:20px;padding:20px;margin:20px 0;border-radius:10px;border:2px dashed #00ff96;word-break:break-all}
        button{background:#00ff96;color:#000;border:none;padding:14px 40px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;margin:5px}
        button:hover{background:#00cc78}
        .lock-btn{display:inline-block;background:#00ff96;color:#000;padding:16px 40px;font-size:16px;font-weight:bold;border-radius:10px;text-decoration:none;margin:15px 0}
        .info{color:#888;font-size:11px;margin-top:15px;line-height:1.6}
        .warning{color:#ff5555;font-size:13px;margin:10px 0}
        .expired-box{background:#1a0000;border:1px solid #ff3333;padding:25px;border-radius:10px;margin:15px 0}
    </style>
</head>
<body>
    <div class="box" id="main"></div>
    <script>
        var LV = "https://link-center.net/6819549/eLZPTLtWBC8k";
        var hash = new URLSearchParams(window.location.search).get('hash');

        function generateKey() {
            var now = new Date();
            var y = now.getFullYear();
            var m = ('0' + (now.getMonth() + 1)).slice(-2);
            var d = ('0' + now.getDate()).slice(-2);
            var h = ('0' + now.getHours()).slice(-2);
            var dateStr = y + m + d + h;
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            return "DEDSEC-" + dateStr + "-" + random;
        }

        function showKey(k) {
            document.getElementById('main').innerHTML = 
                '<h2>🛡️ YOUR KEY</h2>' +
                '<p style="color:#888;font-size:12px">One-time use - Copy now!</p>' +
                '<div class="key" id="keyText">' + k + '</div>' +
                '<button onclick="copyAndClose()">📋 COPY KEY</button>' +
                '<p class="warning">⚠️ Refreshing will NOT give a new key!</p>' +
                '<p class="info">Paste this key into your Roblox script</p>';
        }

        function showHashExpired() {
            document.getElementById('main').innerHTML = 
                '<span style="font-size:60px;display:block;margin:20px 0">⏰</span>' +
                '<h2>HASH EXPIRED</h2>' +
                '<div class="expired-box">' +
                '<p style="color:#ff5555;font-size:14px">This link has already been used!</p>' +
                '<p style="color:#ffaa00;font-size:12px;margin-top:10px">Each verification gives ONE key only.</p>' +
                '</div>' +
                '<a href="' + LV + '" class="lock-btn">🔗 GET NEW KEY</a>' +
                '<p class="info">Click above → Complete verification → Get new key</p>';
        }

        function showLock() {
            document.getElementById('main').innerHTML = 
                '<span style="font-size:60px;display:block;margin:20px 0">🔒</span>' +
                '<h2>VERIFICATION REQUIRED</h2>' +
                '<p style="color:#888;font-size:13px">Complete verification to get your key</p>' +
                '<a href="' + LV + '" class="lock-btn">🔗 UNLOCK KEY</a>' +
                '<p class="info">Click above → Complete verification → Get key automatically</p>';
        }

        function copyAndClose() {
            var k = document.getElementById('keyText').textContent;
            if (k) {
                navigator.clipboard.writeText(k).then(function() {
                    document.querySelector('button').textContent = '✅ COPIED!';
                    document.querySelector('button').style.background = '#00cc78';
                });
            }
        }

        // ============================================
        // LOGIC: HASH DÙNG 1 LẦN - KIỂM TRA HASH ĐÃ DÙNG CHƯA
        // ============================================
        if (hash && hash.length > 5) {
            var now = new Date();
            var currentHour = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + ('0'+now.getHours()).slice(-2);
            
            // Kiểm tra hash đã được dùng chưa
            var usedHashes = JSON.parse(localStorage.getItem('used_hashes') || '{}');
            
            if (usedHashes[hash]) {
                // Hash đã dùng rồi → Từ chối
                showHashExpired();
            } else {
                // Hash chưa dùng → Đánh dấu đã dùng
                usedHashes[hash] = {
                    hour: currentHour,
                    time: now.getTime()
                };
                localStorage.setItem('used_hashes', JSON.stringify(usedHashes));
                
                // Tạo key mới và hiển thị
                var newKey = generateKey();
                
                // Lưu key vào localStorage (chỉ để hiện lại nếu F5)
                localStorage.setItem('current_key', JSON.stringify({
                    key: newKey,
                    hour: currentHour
                }));
                
                showKey(newKey);
            }
        } else {
            showLock();
        }
    </script>
</body>
</html>

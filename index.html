<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Get Key</title>
    <style>

        .box{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #0f0}
        h2{color:#0f0}.key{background:#000;color:#0f0;padding:15px;margin:15px 0;font-size:18px;word-break:break-all}
        button{background:#0f0;color:#000;padding:12px 30px;border:none;font-weight:bold;cursor:pointer;border-radius:5px}
        .lock{background:#0f0;color:#000;padding:15px;display:inline-block;text-decoration:none;font-weight:bold;border-radius:8px;margin:10px}
    </style>
</head>
<body>
<div class="box" id="m"></div>
<script>
var LV="https://link-center.net/6819549/eLZPTLtWBC8k";
var h=new URLSearchParams(location.search).get('hash');
var S="Dedsec2024SecretKey!@#$%^&*()";

function gk(){
    var n=new Date();
    var d=n.getFullYear()+("0"+(n.getMonth()+1)).slice(-2)+("0"+n.getDate()).slice(-2)+("0"+n.getHours()).slice(-2);
    return "DEDSEC-"+d+"-"+S.substring(0,8).toUpperCase();
}

function sk(k){
    document.getElementById('m').innerHTML='<h2>YOUR KEY</h2><div class="key">'+k+'</div><button onclick="copyKey()">COPY KEY</button>';
}
function sl(){
    document.getElementById('m').innerHTML='<h2>VERIFY</h2><a href="'+LV+'" class="lock">UNLOCK KEY</a>';
}
function copyKey(){
    var k=document.querySelector('.key').textContent;
    navigator.clipboard.writeText(k).then(function(){alert('Copied!')});
}
if(h&&h.length>5){sk(gk());}else{sl();}
</script>

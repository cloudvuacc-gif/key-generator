<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key - Anti-AFK Script</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #00ff96;
            box-shadow: 0 0 30px rgba(0,255,150,0.2);
            max-width: 500px;
            width: 95%;
        }
        h2 { color: #00ff96; margin-bottom: 5px; }
        .key {
            background: #000;
            color: #00ff96;
            font-family: monospace;
            font-size: 18px;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border: 2px dashed #00ff96;
            word-break: break-all;
        }
        button {
            background: #00ff96;
            color: #000;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #00cc78; }
        .time { color: #ffaa00; font-size: 13px; margin: 10px 0; }
        .info { color: #888; font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ KEY ANTI-AFK 24 GIỜ</h2>
        <div class="key" id="keyText">Đang tạo key...</div>
        <button onclick="copyKey()">📋 COPY KEY</button>
        <p class="time" id="timeText"></p>
        <p class="info">Dán key vào script Roblox để sử dụng</p>
    </div>

    <script>
        const SECRET_KEY = "Dedsec2024SecretKey!@#$%^&*()";
        
        function xorEncode(text, key) {
            let result = [];
            for (let i = 0; i < text.length; i++) {
                result.push(String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length)));
            }
            return result.join('');
        }
        
        function generateKey() {
            const now = Date.now();
            const expiry = now + (24 * 60 * 60 * 1000);
            const randomPart = Math.random().toString(36).substring(2, 10);
            const payload = expiry + "|" + randomPart + "|" + SECRET_KEY;
            const encrypted = xorEncode(payload, SECRET_KEY);
            const base64 = btoa(encrypted).replace(/[=+/]/g, '').substring(0, 40);
            const finalKey = "DEDSEC-" + base64.substring(0,8) + "-" + base64.substring(8,16) + "-" + base64.substring(16,24) + "-" + base64.substring(24,32);
            return { key: finalKey, expiry: expiry };
        }
        
        function displayKey(keyData) {
            document.getElementById('keyText').textContent = keyData.key;
            document.getElementById('timeText').textContent = '⏰ Hết hạn: ' + new Date(keyData.expiry).toLocaleString('vi-VN');
            
            function tick() {
                const remaining = keyData.expiry - Date.now();
                if (remaining <= 0) {
                    document.getElementById('timeText').textContent = '❌ KEY HẾT HẠN - TẢI LẠI TRANG';
                    return;
                }
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                document.getElementById('timeText').textContent = '⏰ Hết hạn: ' + new Date(keyData.expiry).toLocaleString('vi-VN') + ' | Còn: ' + h + 'h ' + m + 'm ' + s + 's';
            }
            tick();
            setInterval(tick, 1000);
        }
        
        function copyKey() {
            const key = document.getElementById('keyText').textContent;
            navigator.clipboard.writeText(key).then(() => alert('✅ Đã copy key!'));
        }
        
        // Tự động tạo key khi mở trang
        const saved = localStorage.getItem('dedsec_afk_key');
        if (saved) {
            const data = JSON.parse(saved);
            if (data.expiry > Date.now()) {
                displayKey(data);
            } else {
                const newKey = generateKey();
                localStorage.setItem('dedsec_afk_key', JSON.stringify(newKey));
                displayKey(newKey);
            }
        } else {
            const newKey = generateKey();
            localStorage.setItem('dedsec_afk_key', JSON.stringify(newKey));
            displayKey(newKey);
        }
    </script>
</body>
</html>

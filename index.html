<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - Anti-AFK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .container{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #00ff96;box-shadow:0 0 30px rgba(0,255,150,0.2);max-width:500px;width:95%}
        h2{color:#00ff96;margin-bottom:10px}
        .key{background:#000;color:#00ff96;font-family:monospace;font-size:20px;padding:20px;margin:20px 0;border-radius:10px;border:2px dashed #00ff96;word-break:break-all}
        button{background:#00ff96;color:#000;border:none;padding:14px 40px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer}
        button:hover{background:#00cc78}
        .info{color:#888;font-size:11px;margin-top:15px;line-height:1.6}
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ YOUR UNIQUE KEY</h2>
        <p style="color:#888;font-size:12px">Key tied to your IP - 24 hours</p>
        <div class="key" id="keyText">Loading key...</div>
        <button onclick="copyKey()">📋 COPY KEY</button>
        <p class="info">
            📌 <b>How to use:</b><br>
            1. Copy your key above<br>
            2. Paste into Roblox script<br>
            3. Key expires at midnight
        </p>
    </div>
    <script>
        var API_URL = "https://script.google.com/macros/s/AKfycbzgs-q5z8hx10YmLGSPuiyGnA1pTyHnfDiKtT9ccVMGM04pti0e0itmmMq2B6FRd6Y_/exec";
        
        function copyKey(){
            var k = document.getElementById('keyText').textContent;
            if(k && k !== 'Loading key...' && k !== 'Error loading key'){
                navigator.clipboard.writeText(k).then(function(){alert('✅ Key copied!')});
            }
        }
        
        fetch('https://api.ipify.org?format=json')
            .then(function(r){return r.json()})
            .then(function(data){
                return fetch(API_URL + '?action=generate&ip=' + encodeURIComponent(data.ip));
            })
            .then(function(r){return r.json()})
            .then(function(data){
                if(data.success){
                    document.getElementById('keyText').textContent = data.key;
                } else {
                    document.getElementById('keyText').textContent = 'Error loading key';
                }
            })
            .catch(function(){
                document.getElementById('keyText').textContent = 'Error loading key';
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - Anti-AFK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .container{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #00ff96;box-shadow:0 0 30px rgba(0,255,150,0.2);max-width:500px;width:95%}
        h2{color:#00ff96;margin-bottom:10px}
        .key{background:#000;color:#00ff96;font-family:monospace;font-size:20px;padding:20px;margin:20px 0;border-radius:10px;border:2px dashed #00ff96;word-break:break-all}
        button{background:#00ff96;color:#000;border:none;padding:14px 40px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;margin:5px}
        button:hover{background:#00cc78}
        .lock-btn{display:block;width:100%;background:linear-gradient(90deg,#00ff96,#00d4ff);color:#000;padding:16px;font-size:16px;font-weight:bold;border-radius:10px;text-decoration:none;margin:15px 0}
        .info{color:#888;font-size:11px;margin-top:15px;line-height:1.6}
    </style>
</head>
<body>
    <div class="container" id="main"></div>
    <script>
        var LV = "https://link-center.net/6819549/eLZPTLtWBC8k";
        var hash = new URLSearchParams(window.location.search).get('hash');
        var SECRET = "Dedsec2024SecretKey!@#$%^&*()";

        function generateKey() {
            var now = new Date();
            var dateStr = now.getFullYear() + 
                         ('0'+(now.getMonth()+1)).slice(-2) + 
                         ('0'+now.getDate()).slice(-2) + 
                         ('0'+now.getHours()).slice(-2);
            
            // Tạo key = Base64(NgayGio + Secret)
            var raw = dateStr + SECRET;
            var base64 = btoa(raw).replace(/[=+/]/g, '').substring(0, 16).toUpperCase();
            return 'DEDSEC-' + base64.substring(0,8) + '-' + base64.substring(8,16);
        }

        function showKey(k){
            document.getElementById('main').innerHTML = 
                '<h2>🛡️ YOUR KEY</h2>' +
                '<p style="color:#888;font-size:12px">Key changes every hour</p>' +
                '<div class="key" id="keyText">' + k + '</div>' +
                '<button onclick="copyKey()">📋 COPY KEY</button>' +
                '<p class="info">Paste this key into your Roblox script</p>';
        }

        function showLock(){
            document.getElementById('main').innerHTML = 
                '<span style="font-size:60px;display:block;margin:20px 0">🔒</span>' +
                '<h2>VERIFICATION REQUIRED</h2>' +
                '<a href="' + LV + '" class="lock-btn">🔗 UNLOCK KEY</a>';
        }

        function copyKey(){
            var k = document.getElementById('keyText').textContent;
            if(k) navigator.clipboard.writeText(k).then(function(){alert('Copied!')});
        }

        if(hash && hash.length > 5){ showKey(generateKey()); } else { showLock(); }
    </script>
</body>
</html>

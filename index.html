<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - Anti-AFK</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .container{background:#111;padding:30px;border-radius:15px;text-align:center;border:1px solid #00ff96;box-shadow:0 0 30px rgba(0,255,150,0.2);max-width:500px;width:95%}
        h2{color:#00ff96;margin-bottom:10px}
        .key{background:#000;color:#00ff96;font-family:monospace;font-size:20px;padding:20px;margin:20px 0;border-radius:10px;border:2px dashed #00ff96;word-break:break-all}
        button{background:#00ff96;color:#000;border:none;padding:14px 40px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;margin:5px}
        button:hover{background:#00cc78}
        .status{color:#ffaa00;font-size:12px;margin:10px 0}
        .info{color:#888;font-size:11px;margin-top:15px;line-height:1.6}
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ YOUR UNIQUE KEY</h2>
        <p style="color:#888;font-size:12px">Key tied to your IP - Resets daily</p>
        <div class="key" id="keyText">Generating your key...</div>
        <button onclick="copyKey()">📋 COPY KEY</button>
        <p class="status" id="statusText"></p>
        <p class="info">
            📌 <b>How to use:</b><br>
            1. Copy your unique key<br>
            2. Paste into Roblox script<br>
            3. Key expires at midnight<br>
            4. Each IP gets a different key
        </p>
    </div>
    <script>
        var API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";
        
        function copyKey(){
            var k = document.getElementById('keyText').textContent;
            if(k && k !== 'Generating your key...' && k !== 'Failed'){
                navigator.clipboard.writeText(k).then(function(){alert('Copied!')});
            }
        }
        
        // Lấy IP từ ipify rồi gọi API
        fetch('https://api.ipify.org?format=json')
            .then(function(r){return r.json()})
            .then(function(data){
                var ip = data.ip;
                document.getElementById('statusText').textContent = 'IP: ' + ip + ' - Getting your key...';
                return fetch(API_URL + '?action=generate&ip=' + encodeURIComponent(ip));
            })
            .then(function(r){return r.json()})
            .then(function(data){
                if(data.success){
                    document.getElementById('keyText').textContent = data.key;
                    document.getElementById('statusText').textContent = '✅ ' + data.message;
                }else{
                    throw new Error('Failed');
                }
            })
            .catch(function(){
                document.getElementById('keyText').textContent = 'Failed';
                document.getElementById('statusText').textContent = '❌ Error. Try again.';
            });
    </script>
</body>
</html>
